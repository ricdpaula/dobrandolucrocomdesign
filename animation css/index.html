<!DOCTYPE html>

<html>

<head>

	<title>Animação continua loop CSS</title>
	<meta charset="utf-8">
	<style type="text/css">
		
		*{

			margin: 0;
			padding: 0;
		}

		.container_main{

			background-color: #303841;
			height: 1080px;
			overflow: hidden;
			-webkit-animation-name: bg1;
			animation-name: bg1;
			animation-iteration-count: infinite;
			animation-duration: 4s;
			display: block;
 
		}

		.logo{

			margin: 0 auto;
			width: 10%;
			position: relative;
			top: 25%;

		}

		/*Elementos DIV*/

		.ts{

			
			width: 200px;
			position: relative;
			z-index: 1200;
			-webkit-animation-name: ts;
			animation-name: ts;
			animation-iteration-count: infinite;
			animation-duration: 4s;
		}

		.ts2{

			
			width: 200px;
			position: relative;
			top: -90px;
			right: 40px;
			-webkit-animation-name: ts2;
			animation-name: ts2;
			animation-iteration-count: infinite;
			animation-duration: 4s;
			
		}

		/*Animação*/


		@-webkit-keyframes ts{

			0% { -webkit-transform: scale(0.5); -webkit-transform: rotateY(40deg); opacity: 1; }
			30% { -webkit-transform: rotateX(30deg); opacity: 0.9; }
			50% { opacity: 0; }
			80% { -webkit-transform: rotateY(40deg) rotate(200deg) scale(10.9); opacity: 0;}
			100% { opacity: 0;}

		}

		@-webkit-keyframes ts2{

			0% { -webkit-transform: scale(0.5); -webkit-transform: rotateY(40deg); opacity: 1; }
			30% { -webkit-transform: rotateX(30deg); opacity: 0.9; }
			50% { opacity: 0; }
			80% { -webkit-transform: rotateY(40deg) rotate(100deg) scale(10.9); opacity: 0;}
			100% { opacity: 0;}

		}

		@-webkit-keyframes bg1{

			0% {opacity: 1;}
			30% {opacity: 1;}
			100% {opacity: 0; display: none;}
		}



	</style>

</head>

<body>

	<!-- Estrutura Principal -->

	<div class="container_main">
		<div class="logo">
		<img src="separado1.png" class="ts">
		<img src="separado2.png" class="ts2">
		</div>	
	</div>

</body>

</html>
